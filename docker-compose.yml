x-database: &database
  DATABASE_URL: postgres://galaxy:galaxy_dev@postgres:5432/galaxy_empire?sslmode=disable

x-internal-secret: &internal-secret
  INTERNAL_SECRET: internal-dev-secret

x-build-go: &build-go
  dockerfile: ../../build/Dockerfile.go

services:
  # ── Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    mem_limit: 300m
    environment:
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: galaxy_dev
      POSTGRES_DB: galaxy_empire
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galaxy"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Frontend ──────────────────────────────────────────
  nginx:
    mem_limit: 100m
    build:
      context: ./game
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway

  # ── Microservices ─────────────────────────────────────
  gateway:
    mem_limit: 100m
    build:
      context: ./cmd/gateway
      <<: *build-go
    ports:
      - "8080:8080"
    environment:
      <<: [*database, *internal-secret]
      JWT_SECRET: dev-secret-change-in-production
      PLANET_SERVICE_ADDR: http://planet:8082
      AUTH_SERVICE_ADDR: http://auth:8081
      FLEET_SERVICE_ADDR: http://fleet:8083
      ESPIONAGE_SERVICE_ADDR: http://espionage:8086
      RESEARCH_SERVICE_ADDR: http://research:8085
      NEBULA_SERVICE_ADDR: http://nebula:8088
      ALLIANCE_SERVICE_ADDR: http://alliance:8087
      CHAT_SERVICE_ADDR: http://chat:8090
      NOTIFICATION_SERVICE_ADDR: http://notification:8093
      QUEST_SERVICE_ADDR: http://quest:8094
      EVENT_SERVICE_ADDR: http://event:8095
      RADAR_SERVICE_ADDR: http://radar:8089
      FRIEND_SERVICE_ADDR: http://friend:8091
      RANKING_SERVICE_ADDR: http://ranking:8092
      TUTORIAL_SERVICE_ADDR: http://tutorial:8097
      ADMIN_SERVICE_ADDR: http://admin:8096
    depends_on:
      postgres:
        condition: service_healthy

  auth:
    mem_limit: 100m
    build:
      context: ./cmd/auth
      <<: *build-go
    environment:
      <<: [*database, *internal-secret]
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  planet:
    mem_limit: 100m
    build:
      context: ./cmd/planet
      <<: *build-go
    environment:
      <<: *database
    depends_on:
      postgres:
        condition: service_healthy

  fleet:
    mem_limit: 100m
    build:
      context: ./cmd/fleet
      <<: *build-go
    environment:
      <<: [*database, *internal-secret]
      PLANET_SERVICE_URL: http://planet:8082
      COMBAT_SERVICE_URL: http://combat:8084
      AUTH_SERVICE_URL: http://auth:8081
    depends_on:
      postgres:
        condition: service_healthy

  combat:
    mem_limit: 100m
    build:
      context: ./cmd/combat
      <<: *build-go
    environment:
      <<: *database
      PLANET_SERVICE_URL: http://planet:8082
